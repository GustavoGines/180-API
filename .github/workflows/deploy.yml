name: Deploy API to Render

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─── Paso 1: Tests (gate de calidad) ───────────────────────────────────────
  test:
    name: Run Laravel Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Execute Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  # ─── Paso 2: Deploy a Render (solo si los tests pasaron) ───────────────────
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: test          # ← solo corre si el job "test" terminó en verde

    steps:
      - name: Deploy to Render via webhook
        run: |
          curl --silent --show-error --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
